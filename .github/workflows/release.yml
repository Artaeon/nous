name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -count=1 -timeout=600s

      - name: Build binaries
        run: |
          mkdir -p dist

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/nous-linux-amd64 ./cmd/nous
          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/nous-linux-arm64 ./cmd/nous
          # macOS amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/nous-darwin-amd64 ./cmd/nous
          # macOS arm64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/nous-darwin-arm64 ./cmd/nous
          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/nous-windows-amd64.exe ./cmd/nous

      - name: Train neural model
        run: |
          go run ./cmd/nous-train -o dist/nous-neural.bin

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/nous-linux-amd64
            dist/nous-linux-arm64
            dist/nous-darwin-amd64
            dist/nous-darwin-arm64
            dist/nous-windows-amd64.exe
            dist/nous-neural.bin
            dist/checksums.txt
