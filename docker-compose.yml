services:
  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment below for GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  nous:
    build: .
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      - NOUS_TELEGRAM_TOKEN=${NOUS_TELEGRAM_TOKEN:-}
    command:
      - "--serve"
      - "--port"
      - "3333"
      - "--public"
      - "--model"
      - "${NOUS_MODEL:-qwen3:4b}"
      - "--host"
      - "http://ollama:11434"
      - "--memory"
      - "/data"
      - "--trust"
      - "--allow-shell"
      - "--api-key"
      - "${NOUS_API_KEY:-}"
    ports:
      - "3333:3333"
    volumes:
      - nous_data:/data
      - nous_workspace:/workspace
    labels:
      # Traefik integration — adjust domain to yours
      - "traefik.enable=true"
      - "traefik.http.routers.nous.rule=Host(`nous.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.nous.entrypoints=websecure"
      - "traefik.http.routers.nous.tls.certresolver=letsencrypt"
      - "traefik.http.services.nous.loadbalancer.server.port=3333"

volumes:
  ollama_data:
  nous_data:
  nous_workspace:
