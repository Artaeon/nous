services:
  # To use Ollama inside Docker (with GPU), uncomment this service
  # and change OLLAMA_HOST below to http://ollama:11434
  #
  # ollama:
  #   image: ollama/ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

  nous:
    build: .
    restart: unless-stopped
    network_mode: host
    environment:
      - NOUS_TELEGRAM_TOKEN=${NOUS_TELEGRAM_TOKEN:-}
    command:
      - "--serve"
      - "--port"
      - "3333"
      - "--public"
      - "--model"
      - "${NOUS_MODEL:-qwen3:4b}"
      - "--host"
      - "http://127.0.0.1:11434"
      - "--memory"
      - "/data"
      - "--trust"
      - "--allow-shell"
      - "--api-key"
      - "${NOUS_API_KEY:-}"
    volumes:
      - nous_data:/data
      - nous_workspace:/workspace
    labels:
      # Traefik integration — adjust domain to yours
      - "traefik.enable=true"
      - "traefik.http.routers.nous.rule=Host(`nous.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.nous.entrypoints=websecure"
      - "traefik.http.routers.nous.tls.certresolver=letsencrypt"
      - "traefik.http.services.nous.loadbalancer.server.port=3333"

volumes:
  nous_data:
  nous_workspace:
