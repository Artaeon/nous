version: "3.8"

services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  nous:
    build: .
    ports:
      - "3333:3333"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: ["--serve", "--port", "3333", "--host", "http://ollama:11434", "--trust"]
    volumes:
      - nous_data:/app/.nous
      - ./:/workspace

volumes:
  ollama_data:
  nous_data:
