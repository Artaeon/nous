<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <!-- Glow filter for text -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.024
                0 0 0 0 0.714
                0 0 0 0 0.831
                0 0 0 0.6 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for nodes -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.024
                0 0 0 0 0.714
                0 0 0 0 0.831
                0 0 0 0.5 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient for background depth -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <!-- Gradient for accent line -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="30%" stop-color="#06b6d4"/>
      <stop offset="70%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)"/>

  <!-- Neural network pattern — left cluster -->
  <g opacity="0.35" filter="url(#nodeGlow)">
    <!-- Left side nodes -->
    <circle cx="85" cy="45" r="2.5" fill="#06b6d4"/>
    <circle cx="130" cy="70" r="3" fill="#06b6d4"/>
    <circle cx="60" cy="90" r="2" fill="#06b6d4"/>
    <circle cx="110" cy="110" r="2.5" fill="#06b6d4"/>
    <circle cx="150" cy="40" r="2" fill="#06b6d4"/>
    <circle cx="45" cy="55" r="1.8" fill="#06b6d4"/>
    <circle cx="100" cy="150" r="2.2" fill="#06b6d4"/>
    <circle cx="140" cy="140" r="1.8" fill="#06b6d4"/>
    <circle cx="70" cy="135" r="2" fill="#06b6d4"/>
    <circle cx="160" cy="95" r="2.5" fill="#06b6d4"/>
    <circle cx="50" cy="160" r="1.5" fill="#06b6d4"/>
    <circle cx="120" cy="30" r="1.8" fill="#06b6d4"/>
  </g>
  <g opacity="0.15" stroke="#06b6d4" stroke-width="0.8">
    <!-- Left side connections -->
    <line x1="85" y1="45" x2="130" y2="70"/>
    <line x1="85" y1="45" x2="60" y2="90"/>
    <line x1="130" y1="70" x2="110" y2="110"/>
    <line x1="60" y1="90" x2="110" y2="110"/>
    <line x1="150" y1="40" x2="130" y2="70"/>
    <line x1="45" y1="55" x2="85" y2="45"/>
    <line x1="45" y1="55" x2="60" y2="90"/>
    <line x1="110" y1="110" x2="100" y2="150"/>
    <line x1="110" y1="110" x2="140" y2="140"/>
    <line x1="100" y1="150" x2="70" y2="135"/>
    <line x1="70" y1="135" x2="60" y2="90"/>
    <line x1="140" y1="140" x2="160" y2="95"/>
    <line x1="160" y1="95" x2="130" y2="70"/>
    <line x1="50" y1="160" x2="70" y2="135"/>
    <line x1="120" y1="30" x2="150" y2="40"/>
    <line x1="120" y1="30" x2="85" y2="45"/>
    <line x1="100" y1="150" x2="140" y2="140"/>
    <line x1="150" y1="40" x2="160" y2="95"/>
  </g>

  <!-- Neural network pattern — right cluster -->
  <g opacity="0.35" filter="url(#nodeGlow)">
    <circle cx="640" cy="50" r="2" fill="#06b6d4"/>
    <circle cx="690" cy="35" r="2.5" fill="#06b6d4"/>
    <circle cx="720" cy="75" r="3" fill="#06b6d4"/>
    <circle cx="660" cy="100" r="2.5" fill="#06b6d4"/>
    <circle cx="750" cy="45" r="1.8" fill="#06b6d4"/>
    <circle cx="700" cy="120" r="2.2" fill="#06b6d4"/>
    <circle cx="740" cy="140" r="2" fill="#06b6d4"/>
    <circle cx="670" cy="145" r="2.5" fill="#06b6d4"/>
    <circle cx="760" cy="105" r="2" fill="#06b6d4"/>
    <circle cx="650" cy="160" r="1.8" fill="#06b6d4"/>
    <circle cx="720" cy="165" r="1.5" fill="#06b6d4"/>
    <circle cx="755" cy="160" r="2" fill="#06b6d4"/>
  </g>
  <g opacity="0.15" stroke="#06b6d4" stroke-width="0.8">
    <line x1="640" y1="50" x2="690" y2="35"/>
    <line x1="690" y1="35" x2="720" y2="75"/>
    <line x1="640" y1="50" x2="660" y2="100"/>
    <line x1="720" y1="75" x2="660" y2="100"/>
    <line x1="750" y1="45" x2="720" y2="75"/>
    <line x1="750" y1="45" x2="690" y2="35"/>
    <line x1="720" y1="75" x2="700" y2="120"/>
    <line x1="660" y1="100" x2="700" y2="120"/>
    <line x1="700" y1="120" x2="740" y2="140"/>
    <line x1="700" y1="120" x2="670" y2="145"/>
    <line x1="660" y1="100" x2="670" y2="145"/>
    <line x1="740" y1="140" x2="760" y2="105"/>
    <line x1="760" y1="105" x2="720" y2="75"/>
    <line x1="670" y1="145" x2="650" y2="160"/>
    <line x1="740" y1="140" x2="720" y2="165"/>
    <line x1="740" y1="140" x2="755" y2="160"/>
    <line x1="755" y1="160" x2="760" y2="105"/>
    <line x1="650" y1="160" x2="720" y2="165"/>
  </g>

  <!-- Scattered ambient dots -->
  <g opacity="0.12">
    <circle cx="200" cy="30" r="1" fill="#06b6d4"/>
    <circle cx="250" cy="170" r="1.2" fill="#06b6d4"/>
    <circle cx="550" cy="25" r="1" fill="#06b6d4"/>
    <circle cx="580" cy="175" r="1.3" fill="#06b6d4"/>
    <circle cx="300" cy="180" r="0.8" fill="#06b6d4"/>
    <circle cx="500" cy="20" r="1" fill="#06b6d4"/>
    <circle cx="220" cy="165" r="0.8" fill="#06b6d4"/>
    <circle cx="570" cy="35" r="0.9" fill="#06b6d4"/>
  </g>

  <!-- Accent line below title area -->
  <rect x="200" y="145" width="400" height="1" fill="url(#lineGrad)" opacity="0.5"/>

  <!-- Main title: NOUS -->
  <text x="400" y="95" text-anchor="middle"
    font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" letter-spacing="16"
    fill="#f0f6fc" filter="url(#textGlow)">NOUS</text>

  <!-- Subtitle -->
  <text x="400" y="135" text-anchor="middle"
    font-family="'SF Pro Text', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="14" font-weight="400" letter-spacing="2"
    fill="#8b949e" opacity="0.9">&#x3BD;&#x3BF;&#x1FE6;&#x3C2; &#x2014; Native Orchestration of Unified Streams</text>

  <!-- Thin top/bottom border accent -->
  <rect x="0" y="0" width="800" height="1" fill="#06b6d4" opacity="0.15"/>
  <rect x="0" y="199" width="800" height="1" fill="#06b6d4" opacity="0.15"/>
</svg>
