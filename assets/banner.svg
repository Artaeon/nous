<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Nous banner</title>
  <desc id="desc">A local-first cognitive engine banner showing deterministic reasoning, memory, and tool orchestration.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09141c"/>
      <stop offset="45%" stop-color="#102433"/>
      <stop offset="100%" stop-color="#071018"/>
    </linearGradient>
    <radialGradient id="auroraLeft" cx="25%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#19d3c5" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#19d3c5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraRight" cx="78%" cy="38%" r="45%">
      <stop offset="0%" stop-color="#ff8a3d" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#59f0e3" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#ff9f5c" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#59f0e3"/>
      <stop offset="55%" stop-color="#b2fff5"/>
      <stop offset="100%" stop-color="#ff9f5c"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#8ecfc9" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="420" rx="28" fill="url(#auroraLeft)"/>
  <rect width="1200" height="420" rx="28" fill="url(#auroraRight)"/>

  <g opacity="0.12">
    <path d="M0 322 C175 274 275 358 426 296 C575 236 718 332 874 280 C980 246 1076 255 1200 212" fill="none" stroke="#59f0e3" stroke-width="2"/>
    <path d="M0 350 C142 312 259 391 415 338 C571 286 721 380 876 336 C1010 298 1088 327 1200 291" fill="none" stroke="#ff9f5c" stroke-width="2"/>
  </g>

  <g transform="translate(72 56)">
    <rect x="0" y="0" width="112" height="30" rx="15" fill="#0f2731" stroke="#59f0e3" stroke-opacity="0.35"/>
    <text x="56" y="20" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#b9fff7">LOCAL-FIRST AI</text>

    <text x="0" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="10" fill="#f5fffd" filter="url(#textGlow)">NOUS</text>
    <rect x="2" y="126" width="420" height="5" rx="2.5" fill="url(#accent)"/>

    <text x="0" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#d9f8f4">Deterministic cognition for reasoning, memory, and action.</text>
    <text x="0" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#b7d3d1">No cloud dependency. No model downloads. No wrapper theater.</text>
    <text x="0" y="236" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#b7d3d1">Just a native cognitive stack built in Go and shaped for daily use.</text>

    <g transform="translate(0 274)">
      <rect x="0" y="0" width="156" height="48" rx="12" fill="#102833" stroke="#59f0e3" stroke-opacity="0.28"/>
      <rect x="170" y="0" width="156" height="48" rx="12" fill="#102833" stroke="#59f0e3" stroke-opacity="0.28"/>
      <rect x="340" y="0" width="156" height="48" rx="12" fill="#102833" stroke="#ff9f5c" stroke-opacity="0.32"/>
      <text x="78" y="20" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.4" fill="#8cf5ea">THINKING ENGINE</text>
      <text x="78" y="35" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d6efec">intent -> frame -> generate</text>
      <text x="248" y="20" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.4" fill="#8cf5ea">MEMORY SYSTEM</text>
      <text x="248" y="35" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d6efec">working -> episodic -> project</text>
      <text x="418" y="20" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.4" fill="#ffc397">ACTION LAYER</text>
      <text x="418" y="35" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d6efec">51 built-in tools, local routing</text>
    </g>
  </g>

  <g transform="translate(676 48)">
    <rect x="0" y="0" width="450" height="324" rx="24" fill="#0d1d29" fill-opacity="0.78" stroke="url(#panelStroke)" stroke-width="1.4"/>

    <g transform="translate(34 30)">
      <text x="0" y="0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2.4" fill="#93efe6">INNOVATION SURFACE</text>
      <text x="0" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#f4fffe">Built like a cognitive system,</text>
      <text x="0" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#f4fffe">not an API shell.</text>

      <g transform="translate(0 102)">
        <rect x="0" y="0" width="184" height="72" rx="16" fill="#112a35"/>
        <rect x="198" y="0" width="184" height="72" rx="16" fill="#112a35"/>
        <rect x="0" y="88" width="184" height="72" rx="16" fill="#112a35"/>
        <rect x="198" y="88" width="184" height="72" rx="16" fill="#112a35"/>

        <text x="18" y="24" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#8cf5ea">DISCOURSE PLANNING</text>
        <text x="18" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d7ebea">RST schemas organize prose</text>
        <text x="18" y="61" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d7ebea">before generation starts.</text>

        <text x="216" y="24" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#8cf5ea">KNOWLEDGE GRAPH</text>
        <text x="216" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d7ebea">Multi-hop retrieval, causal</text>
        <text x="216" y="61" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d7ebea">links, and semantic relations.</text>

        <text x="18" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffc397">PROGRESSIVE COMPILATION</text>
        <text x="18" y="133" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d7ebea">Crystals, caches, and recipes</text>
        <text x="18" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d7ebea">make repeated work faster.</text>

        <text x="216" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffc397">TOOL-NATIVE ORCHESTRATION</text>
        <text x="216" y="133" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d7ebea">The assistant reasons directly</text>
        <text x="216" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d7ebea">over local tools and memory.</text>
      </g>
    </g>
  </g>

  <g transform="translate(614 211)">
    <circle cx="0" cy="0" r="78" fill="#1ee3d1" fill-opacity="0.08" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="52" fill="#102c36" stroke="#6ff3e6" stroke-opacity="0.7"/>
    <circle cx="0" cy="0" r="34" fill="#123744" stroke="#dffffc" stroke-opacity="0.7"/>
    <circle cx="0" cy="0" r="8" fill="#fff3e7"/>
    <circle cx="0" cy="0" r="96" fill="none" stroke="#59f0e3" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="124" fill="none" stroke="#ff9f5c" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle cx="-94" cy="-22" r="7" fill="#59f0e3"/>
    <circle cx="98" cy="26" r="7" fill="#ff9f5c"/>
    <circle cx="24" cy="-122" r="6" fill="#c1fff8"/>
    <circle cx="-38" cy="118" r="6" fill="#ffd1ac"/>
    <path d="M-94 -22 C-58 -30 -36 -14 -18 -4" fill="none" stroke="#59f0e3" stroke-opacity="0.38" stroke-width="2"/>
    <path d="M24 -122 C18 -78 12 -48 6 -32" fill="none" stroke="#c1fff8" stroke-opacity="0.3" stroke-width="2"/>
    <path d="M98 26 C64 19 40 11 20 5" fill="none" stroke="#ff9f5c" stroke-opacity="0.38" stroke-width="2"/>
    <path d="M-38 118 C-28 76 -18 44 -8 22" fill="none" stroke="#ffd1ac" stroke-opacity="0.3" stroke-width="2"/>
  </g>

  <rect x="28" y="28" width="1144" height="364" rx="24" fill="none" stroke="#d7fffb" stroke-opacity="0.08"/>
</svg>
