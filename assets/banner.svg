<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Nous — Autonomous AI Agent</title>
  <desc id="desc">Fully local autonomous AI agent. 52 tools, 680+ topics, zero dependencies.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Glow behind title -->
  <ellipse cx="350" cy="130" rx="250" ry="80" fill="url(#glow)"/>

  <!-- Node graph icon -->
  <g transform="translate(120, 100)" opacity="0.9">
    <circle cx="0" cy="0" r="8" fill="#06b6d4"/>
    <circle cx="35" cy="-20" r="5" fill="#8b5cf6"/>
    <circle cx="-30" cy="-25" r="4" fill="#06b6d4" opacity="0.7"/>
    <circle cx="25" cy="30" r="5" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="-35" cy="20" r="4" fill="#06b6d4" opacity="0.6"/>
    <circle cx="0" cy="-40" r="3" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="40" cy="10" r="3" fill="#06b6d4" opacity="0.5"/>
    <line x1="0" y1="0" x2="35" y2="-20" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="-30" y2="-25" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="25" y2="30" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="-35" y2="20" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="-40" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="40" y2="10" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
    <line x1="35" y1="-20" x2="0" y2="-40" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>
    <line x1="25" y1="30" x2="40" y2="10" stroke="#8b5cf6" stroke-width="0.5" opacity="0.2"/>
    <line x1="-30" y1="-25" x2="-35" y2="20" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Title -->
  <text x="190" y="145" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">nous</text>

  <!-- Accent line -->
  <rect x="190" y="160" width="120" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="190" y="190" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#94a3b8" font-weight="400">Autonomous AI agent. Fully local. Zero dependencies.</text>

  <!-- Stats pills -->
  <g transform="translate(190, 220)">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="#06b6d4" opacity="0.15"/>
    <text x="40" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle" font-weight="600">52 tools</text>

    <rect x="90" y="0" width="88" height="26" rx="13" fill="#8b5cf6" opacity="0.15"/>
    <text x="134" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="600">680+ topics</text>

    <rect x="188" y="0" width="72" height="26" rx="13" fill="#06b6d4" opacity="0.15"/>
    <text x="224" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle" font-weight="600">&lt;50ms</text>

    <rect x="270" y="0" width="88" height="26" rx="13" fill="#8b5cf6" opacity="0.15"/>
    <text x="314" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="600">~50MB RAM</text>

    <rect x="368" y="0" width="64" height="26" rx="13" fill="#06b6d4" opacity="0.15"/>
    <text x="400" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle" font-weight="600">0 deps</text>

    <rect x="442" y="0" width="100" height="26" rx="13" fill="#8b5cf6" opacity="0.15"/>
    <text x="492" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="600">autonomous</text>
  </g>

  <!-- Terminal preview -->
  <g transform="translate(700, 45)">
    <rect x="0" y="0" width="440" height="210" rx="8" fill="#0c0c0c" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="440" height="28" rx="8" fill="#1a1a2e"/>
    <rect x="0" y="20" width="440" height="8" fill="#1a1a2e"/>
    <circle cx="16" cy="14" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="32" cy="14" r="5" fill="#eab308" opacity="0.8"/>
    <circle cx="48" cy="14" r="5" fill="#22c55e" opacity="0.8"/>
    <text x="220" y="18" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">nous</text>

    <text x="12" y="52" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#06b6d4">nous &gt;</text>
    <text x="68" y="52" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#e2e8f0">what is stoicism</text>
    <text x="12" y="72" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="10" fill="#94a3b8">Stoicism was a Hellenistic philosophical</text>
    <text x="12" y="86" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="10" fill="#94a3b8">school founded by Zeno of Citium around</text>
    <text x="12" y="100" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="10" fill="#94a3b8">300 BCE in Athens...</text>

    <text x="12" y="124" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#06b6d4">nous &gt;</text>
    <text x="68" y="124" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#e2e8f0">set a timer for 25 min</text>
    <text x="12" y="144" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="10" fill="#22c55e">Timer started: 25m0s</text>

    <text x="12" y="168" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#06b6d4">nous &gt;</text>
    <text x="68" y="168" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#e2e8f0">whats 25% of 480</text>
    <text x="12" y="188" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="10" fill="#22c55e">0.25*480 = 120</text>

    <text x="12" y="208" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#06b6d4">nous &gt;</text>
    <rect x="68" y="199" width="8" height="12" fill="#06b6d4" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
